name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      # mypy is currently advisory while the broader codebase is being
      # typed up — promote to hard-fail once `mypy src/` is clean.
      - name: mypy (advisory)
        continue-on-error: true
        run: mypy src/

      - name: bandit (medium+ severity)
        run: bandit -r src/ -ll

      # Two-lane test run: fast lane keeps the developer feedback loop
      # under a minute; slow lane exercises the full saas_v3 pipeline and
      # the Hypothesis property suite. Coverage is appended across both
      # lanes and the 80% gate is enforced on the combined total.
      - name: pytest fast lane (default markers)
        run: pytest --cov=src/synth_datagen --cov-report=

      - name: pytest slow lane (full saas_v3 + property tests)
        run: pytest -m slow --cov=src/synth_datagen --cov-append --cov-report=xml --cov-report=term --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
