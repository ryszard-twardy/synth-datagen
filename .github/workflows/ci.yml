name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # Run pre-commit hooks once on the 3.12 leg to catch
      # "I forgot to install pre-commit locally" PRs cheaply (whitespace,
      # EOF, line endings). The individual tool steps below still run on
      # every matrix leg so a Python-version-specific failure is still
      # surfaced separately.
      - name: pre-commit (3.12 only)
        if: matrix.python-version == '3.12'
        run: pre-commit run --all-files --show-diff-on-failure

      - name: ruff lint
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      # mypy is currently advisory while the broader codebase is being
      # typed up — promote to hard-fail once `mypy src/` is clean.
      - name: mypy (advisory)
        continue-on-error: true
        run: mypy src/

      - name: bandit (medium+ severity)
        run: bandit -r src/ -ll

      # Two-lane test run: fast lane keeps the developer feedback loop
      # under a minute; slow lane exercises the full saas_v3 pipeline and
      # the Hypothesis property suite. Coverage is appended across both
      # lanes; the combined floor (80%, set in pyproject.toml) is enforced
      # in a separate `coverage report` step that always runs even when
      # an earlier step failed.
      # ``--cov-fail-under=0`` disables pytest-cov's per-invocation gate
      # so each lane can run independently — the real gate is the
      # ``coverage report`` step below, which reads ``fail_under = 80``
      # from ``[tool.coverage.report]`` in ``pyproject.toml``.
      - name: pytest fast lane (default markers)
        run: pytest --cov=src/synth_datagen --cov-report= --cov-fail-under=0

      - name: pytest slow lane (full saas_v3 + property tests)
        run: pytest -m slow --cov=src/synth_datagen --cov-append --cov-report= --cov-fail-under=0

      - name: coverage gate (combined fast + slow, 80% floor)
        if: always()
        run: |
          coverage report
          coverage xml -o coverage.xml

      # Public-repo tokenless upload — Codecov v4 supports this without
      # CODECOV_TOKEN. Set fail_ci_if_error to false so a Codecov outage
      # doesn't block merges; the coverage gate above is the real signal.
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
