name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "src/synth_datagen/**"
      - "CHANGELOG.md"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy per ref; cancel any in-flight build when a new
# push lands so we never publish a stale revision.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mkdocs git-revision-date plugin (if added later) needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          # We don't ship a uv.lock; deps live in pyproject.toml [docs]
          # extra. Override the action's default cache key so it doesn't
          # error out with 'No matches found for glob **/uv.lock'.
          cache-dependency-glob: pyproject.toml

      - name: Install docs deps
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[docs]"

      - name: Build site (strict)
        run: |
          source .venv/bin/activate
          mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
