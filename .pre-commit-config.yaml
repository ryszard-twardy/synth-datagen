# Pre-commit hooks for the synth-datagen repo (Phase 3, P9).
#
# Install with:
#     pip install pre-commit
#     pre-commit install
#
# Run against the whole repo on demand:
#     pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        # Preserve intentional Markdown hard-breaks (lines ending in two
        # spaces) for ``.md`` files — otherwise the bottom metadata block
        # in ``prompts/00_master.md`` and similar docs collapses into a
        # single paragraph. The hook still strips other trailing
        # whitespace in ``.md`` files.
        args: ["--markdown-linebreak-ext=md"]
      - id: check-yaml
        # mkdocs.yml uses Python-specific YAML tags
        # (``!!python/name:pymdownx.superfences.fence_code_format``) for
        # the Mermaid custom fence. The check-yaml hook ships with
        # ``yaml.safe_load``, which refuses those tags. Excluding the
        # single file is safer than enabling the global ``--unsafe``
        # flag (which would allow arbitrary Python construction in any
        # YAML file in the repo). MkDocs itself parses mkdocs.yml with
        # its own loader, and the docs CI lane runs
        # ``mkdocs build --strict`` which catches any real syntax issue.
        exclude: ^mkdocs\.yml$
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ruff replaces black/isort/flake8. The official mirror tracks ruff
  # versions and is the recommended pre-commit source.
  #
  # Pinned to match the ruff version installed via the ``[test]`` extra
  # so the pre-commit ``ruff-format`` hook and the CI ``ruff format
  # --check .`` step agree on style. When bumping ruff in pyproject.toml
  # (or pulling a newer one transitively), bump this rev to the same
  # version — otherwise the two formatters fight and CI fails.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # mypy runs against the source tree only — tests and scripts are
  # excluded for parity with the CI matrix and to keep the hook fast.
  # ``stages: [manual]`` keeps it out of the default ``pre-commit run``
  # path so the hook matches CI's advisory posture: contributors opt in
  # with ``pre-commit run mypy --all-files --hook-stage manual`` (or run
  # ``mypy src/`` directly). Flip back to default stages once the
  # remaining 57 mypy errors in the wider codebase are fixed.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        stages: [manual]
        files: ^src/
        additional_dependencies:
          - "types-PyYAML>=6.0.0"
          - "pydantic>=2.0.0"
        args: ["--ignore-missing-imports"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        # Mirror the CI invocation exactly: ``bandit -r src/ -ll``.
        # ``pass_filenames: false`` stops pre-commit from appending each
        # changed file path; otherwise -r becomes a no-op per file and
        # output diverges from CI.
        entry: bandit -r src/ -ll
        pass_filenames: false
        files: ^src/
