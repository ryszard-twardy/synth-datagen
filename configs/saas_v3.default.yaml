    weight: 0.06
    feature_category: admin
    platform_weights: {web: 0.96, api: 0.04}
    min_plan: Enterprise

lifecycle:
  new_account_months: 2
  minimum_tenure_days_before_churn: 90
  churn_base_probability: 0.16
  expansion_base_probability: 0.34
  contraction_base_probability: 0.12
  incident_burst_probability: 0.08
  seasonal_strength: 0.12

billing:
  billing_period_weights:
    monthly: 0.63
    quarterly: 0.12
    annual: 0.25
  paid_probability: 0.84
  partial_payment_probability: 0.07
  overdue_probability: 0.07
  void_probability: 0.02

defects:
  null_company_names: {enabled: true, rate: 0.18}
  case_duplicate_emails: {enabled: true, rate: 0.02}
  pre_signup_logins: {enabled: true, rate: 0.015}
  plan_name_typos: {enabled: true, rate: 0.02}
  negative_monthly_amounts: {enabled: true, rate: 0.01}
  reversed_subscription_dates: {enabled: true, rate: 0.01}
  orphaned_product_events: {enabled: true, rate: 0.002}
  future_timestamps: {enabled: true, rate: 0.003}
  bad_date_formats: {enabled: true, rate: 0.003}
  mixed_invoice_amount_formats: {enabled: true, rate: 0.03}
  out_of_range_nps_scores: {enabled: true, rate: 0.02}

output:
  root_dir: ./out/saas_v3
  formats: [csv, parquet, bigquery_schema]
  chunk_rows: 100000
  write_effective_config: true

validation:
  row_count_tolerance:
    invoices: 0.35
  defect_tolerance: 0.30
  local_hour_min: 6
  local_hour_max: 22
